name: build

on:
  push:
  pull_request:

jobs:
  build_job:
    runs-on: [self-hosted, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug PATH
        shell: bash
        run: |
          echo "PATH is: $PATH"
          which docker || echo "docker not found in PATH"
          ls "C:/Program Files/Docker/Docker/resources/bin" || echo "Docker bin folder not found at expected location"

      - name: Run on node:18
        shell: bash
        env:
          MSYS_NO_PATHCONV: 1
        run: |
          WORKSPACE_PATH=$(echo "${{ github.workspace }}" | sed 's/\\/\//g')
          docker run --rm -v "${WORKSPACE_PATH}:/workspace" -w /workspace node:18 sh -c "
            echo 'Running on local Docker runner'
            node --version
          "

  show_variables:
    runs-on: ubuntu-latest

    steps:
      - name: Show environment variable
        run: 'echo "Environment: ${{ vars.APP_ENV }}"'
